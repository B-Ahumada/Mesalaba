<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MesaLab</title>
</head>
<body>
    <section>
        <header>
            <h1>Panel de Control</h1>
        </header>
        <main>
            <form id="solicitudform">
                <div>
                    <label for="titulo">Nombre de la solicitud:</label>
                    <input type="text" id="titulo" name="titulo" oninput="validarFormulario()" required>
                </div>
                <br>
                <div>
                    <label for="descripcion">Ingrese la descripción:</label>
                    <input type="text" id="descripcion" name="descripcion" oninput="validarFormulario()" required>
                </div>  
                <br>
                <div>
                    <label for="prioridad">Seleccione el grado de su prioridad:</label>
                    <select id="prioridad" name="prioridad" oninput="validarFormulario()" required>
                        <option value="baja">Baja</option>
                        <option value="media">Media</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
                <div>
                    <button type="submit">Enviar</button>
                </div>
            </form>
        </main>
    </section>
    <section>
        <header>
            <h1>Solicitudes Enviadas</h1>
        </header>
        <main>
            <table>
                <thead>
                    <tr>
                        <th>Nombre de la solicitud</th>
                        <th>Descripción</th>
                        <th>Prioridad</th>
                    </tr>
                </thead>
                <tbody id="solicitudes">
                    <!-- Aquí se agregarán las solicitudes enviadas -->
                </tbody>
            </table>
        </main>
</body>
<script src="js/validaciones.js"></script>
</html>
